# Stage 1 dogfood config: run zentinel over the mutation fixtures.
# Used with `scripts/dogfood.sh`. No network, no AI; production
# zentinel modules are out of dogfood scope for now.
[project]
name = "dogfood"
# Self-contained: the project root is the mutation fixture, so `zentinel run
# --config zentinel.dogfood.toml` works from the repo root with no extra flags.
root = "test/fixtures/dogfood/sample"
include = ["src/**/*.zig"]
exclude = [".zig-cache/**", "zig-out/**", "test/**"]

[mutators]
enabled = ["arithmetic_add_sub", "comparison_boundary"]

[test]
commands = ["zig test src/calc.zig"]
timeout_ms = 60000

[report]
output_dir = "zig-out/zentinel-dogfood"
